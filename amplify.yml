version: 1
applications:
  - appRoot: wallets/frontend
    frontend:
      phases:
        preBuild:
          commands:
            # Skip build for PRs that don't affect the wallet frontend, then run npm ci
            - |
              set -e

              echo "=== Amplify Build Environment ==="
              echo "AWS_BRANCH: ${AWS_BRANCH:-not set}"
              echo "AWS_PULL_REQUEST_ID: ${AWS_PULL_REQUEST_ID:-not set}"
              echo "Working directory: $(pwd)"

              # Only check for changes on PR builds (not main branch)
              if [ "$AWS_BRANCH" != "main" ] && [ "$AWS_BRANCH" != "master" ]; then
                echo ""
                echo "=== Checking for wallet frontend changes ==="

                # Move to repo root for git operations
                cd ../..
                echo "Repo root: $(pwd)"

                # Fetch main branch for comparison
                echo "Fetching main branch..."
                git fetch origin main --depth=100 2>&1 || true

                # Determine changed files with graceful fallback logic.
                CHANGED_FILES=""
                if git rev-parse --verify origin/main >/dev/null 2>&1; then
                  echo "Comparing with origin/main..."
                  CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>&1) || CHANGED_FILES=""
                else
                  echo "origin/main not available; using local history fallback."
                  BASE_CANDIDATE=$(git rev-list --max-count=1 --skip=30 HEAD 2>/dev/null || true)
                  if [ -n "$BASE_CANDIDATE" ]; then
                    CHANGED_FILES=$(git diff --name-only "$BASE_CANDIDATE"...HEAD 2>&1) || CHANGED_FILES=""
                  else
                    CHANGED_FILES=$(git show --pretty="" --name-only HEAD 2>&1) || CHANGED_FILES=""
                  fi
                fi

                echo "Changed files (sample):"
                echo "$CHANGED_FILES" | head -40

                # Check if any wallet frontend files changed
                # Include markdown files in wallets/ since they generate the frontend data
                # Pattern matches: wallets/frontend/** OR wallets/*.md (root level only) OR amplify.yml
                WALLET_CHANGES=$(echo "$CHANGED_FILES" | grep -E "^(wallets/frontend/|wallets/[^/]*\.md|amplify\.yml)" || true)

                if [ -z "$WALLET_CHANGES" ]; then
                  echo ""
                  echo "=============================================="
                  echo "NO WALLET FRONTEND CHANGES DETECTED"
                  echo "=============================================="
                  echo "This PR does not modify wallets/frontend/, wallets/*.md, or amplify.yml"
                  echo "Skipping Amplify preview build to save resources."
                  echo "Exiting successfully so docs-only PRs are not marked failed."
                  echo ""
                  exit 0
                fi

                echo ""
                echo "Wallet frontend changes detected:"
                echo "$WALLET_CHANGES"

                # Return to app directory
                cd wallets/frontend
              else
                echo "Building main/master branch - skipping change detection"
              fi

              echo ""
              echo "=== Running npm ci ==="
              npm ci
        build:
          commands:
            - npm run build
      artifacts:
        # Static export generates files in 'out' directory
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - 'node_modules/**/*'
          - '.next/cache/**/*'

  # Simple static landing page for a staking subdomain (e.g., cenote-staking.<domain>)
  - appRoot: staking/site
    frontend:
      phases:
        preBuild:
          commands:
            - echo "No prebuild needed (static site)"
        build:
          commands:
            - echo "No build needed (static site)"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'

  # Simple static landing page for an Aztec staking subdomain (e.g., aztec.cenote-staking.<domain>)
  - appRoot: staking/aztec/site
    frontend:
      phases:
        preBuild:
          commands:
            - echo "No prebuild needed (static site)"
        build:
          commands:
            - echo "No build needed (static site)"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'
