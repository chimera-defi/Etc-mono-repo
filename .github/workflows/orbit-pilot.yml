name: Orbit Pilot

on:
  push:
    paths:
      - "apps/orbit-pilot/**"
      - ".github/workflows/orbit-pilot.yml"
  pull_request:
    paths:
      - "apps/orbit-pilot/**"
      - ".github/workflows/orbit-pilot.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orbit-pilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest -q

  browser-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/orbit-pilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with Playwright
        run: pip install -e ".[dev,browser]"
      - name: Install Chromium (system deps + browser)
        run: python -m playwright install --with-deps chromium
      - name: Playwright E2E tests
        env:
          RUN_BROWSER_E2E: "1"
        run: pytest -q tests/test_browser_playwright_e2e.py -v
